<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF 요약기</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4f46e5;
      --primary-light: #6366f1;
      --primary-dark: #3730a3;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --bg: #f5f4fe;
      --surface: #ffffff;
      --border: #e0dff5;
      --text-primary: #1e1b4b;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --shadow-sm: 0 1px 4px rgba(79,70,229,0.06);
      --shadow-md: 0 4px 16px rgba(79,70,229,0.10);
      --shadow-lg: 0 8px 32px rgba(79,70,229,0.15);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 1.5rem 1rem 4rem;
      line-height: 1.5;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    /* ── HEADER ─────────────────────────────────────── */
    .header {
      text-align: center;
      padding: 2.5rem 0 2rem;
    }
    .header-icon {
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: var(--radius-lg);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow-md);
    }
    .header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-primary);
    }
    .header p {
      color: var(--text-secondary);
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    /* ── CARD ───────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem 1.5rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow-sm);
    }
    .card-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.8rem;
    }

    /* ── API KEY ────────────────────────────────────── */
    .api-key-input {
      width: 100%;
      height: 46px;
      padding: 0 1rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: var(--surface);
      color: var(--text-primary);
      font-family: 'Courier New', monospace;
      letter-spacing: 0.03em;
    }
    .api-key-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .api-key-input.valid-key { border-color: var(--success); }
    .api-key-status {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.82rem;
      margin-top: 0.5rem;
    }
    .api-key-status.ok { color: var(--success); }
    .api-key-status.hint { color: var(--text-muted); }

    /* ── DROP ZONE ──────────────────────────────────── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafafe;
      user-select: none;
    }
    .drop-zone:hover { border-color: var(--primary-light); background: #f0efff; }
    .drop-zone.drag-over {
      border-color: var(--primary);
      background: #eeeeff;
      transform: scale(1.01);
    }
    .drop-zone.has-file {
      border-color: var(--success);
      border-style: solid;
      background: #f0fdf4;
    }
    .drop-icon { font-size: 2.5rem; pointer-events: none; }
    .drop-main-text {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-top: 0.6rem;
      pointer-events: none;
    }
    .drop-sub-text {
      font-size: 0.83rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
      pointer-events: none;
    }
    #file-input { display: none; }
    .btn-file-pick {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.5rem 1.3rem;
      background: var(--primary);
      color: #fff;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-file-pick:hover { background: var(--primary-dark); transform: translateY(-1px); }

    /* ── FILE INFO ──────────────────────────────────── */
    .file-info {
      display: none;
      align-items: center;
      gap: 1rem;
      margin-top: 0.9rem;
      padding: 0.8rem 1rem;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: var(--radius-sm);
    }
    .file-info.visible { display: flex; }
    .file-info-icon { font-size: 1.6rem; flex-shrink: 0; }
    .file-info-name {
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--text-primary);
      word-break: break-all;
    }
    .file-info-meta {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-top: 0.2rem;
    }

    /* ── PROGRESS ───────────────────────────────────── */
    #progress-section { display: none; }
    #progress-section.visible { display: block; }
    .progress-bar-track {
      background: #e9e8f8;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
      margin: 0.7rem 0 0.4rem;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-dark), var(--primary-light));
      border-radius: 99px;
      transition: width 0.25s ease;
      width: 0%;
    }
    .progress-label {
      font-size: 0.83rem;
      color: var(--text-secondary);
    }

    /* ── TRUNCATE WARNING ───────────────────────────── */
    .truncate-warning {
      display: none;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.7rem 0.9rem;
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: var(--radius-sm);
      font-size: 0.83rem;
      color: #92400e;
      margin-top: 0.75rem;
      line-height: 1.5;
    }
    .truncate-warning.visible { display: flex; }

    /* ── SUMMARY BUTTON ─────────────────────────────── */
    .btn-summary {
      width: 100%;
      padding: 0.95rem;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      margin-bottom: 1rem;
      box-shadow: 0 4px 14px rgba(79,70,229,0.32);
      letter-spacing: 0.01em;
    }
    .btn-summary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 7px 20px rgba(79,70,229,0.42);
    }
    .btn-summary:active:not(:disabled) { transform: translateY(0); }
    .btn-summary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ERROR BOX ──────────────────────────────────── */
    #error-box {
      display: none;
      padding: 1rem 1.2rem;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: var(--radius);
      margin-bottom: 1rem;
    }
    #error-box.visible { display: block; }
    .error-msg-text {
      color: #991b1b;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 0.6rem;
    }
    .btn-retry {
      padding: 0.4rem 1rem;
      background: var(--error);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-retry:hover { background: #dc2626; }

    /* ── RESULT SECTION ─────────────────────────────── */
    #result-section { display: none; }
    #result-section.visible {
      display: block;
      animation: slideUp 0.38s cubic-bezier(0.22, 0.61, 0.36, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-top {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.1rem;
      flex-wrap: wrap;
    }
    .result-heading {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-right: auto;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.25rem 0.65rem;
      border-radius: 99px;
      font-size: 0.73rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .badge-purple { background: #ede9fe; color: #5b21b6; }
    .badge-teal   { background: #ccfbf1; color: #0f766e; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.4rem;
      margin-bottom: 0.85rem;
      box-shadow: var(--shadow-sm);
    }
    .result-card-label {
      font-size: 0.7rem;
      font-weight: 800;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.55rem;
    }
    .result-card-title-text {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.45rem;
      line-height: 1.4;
    }
    .result-card-body {
      font-size: 0.92rem;
      color: var(--text-secondary);
      line-height: 1.75;
    }

    .section-list { list-style: none; }
    .section-item {
      padding: 0.65rem 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .section-item:last-child { border-bottom: none; }
    .section-item-heading {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.2rem;
    }
    .section-item-summary {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.65;
    }

    .keywords-wrap { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .keyword-tag {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      background: #ede9fe;
      color: #5b21b6;
      border-radius: 99px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .result-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.25rem;
    }
    .btn-action {
      flex: 1;
      padding: 0.7rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
    }
    .btn-copy {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 2px 8px rgba(79,70,229,0.22);
    }
    .btn-copy:hover { background: var(--primary-dark); }
    .btn-reset {
      background: #f3f4f6;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-reset:hover { background: #e5e7eb; color: var(--text-primary); }

    /* ── TOAST ──────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text-primary);
      color: #fff;
      padding: 0.7rem 1.3rem;
      border-radius: var(--radius);
      font-size: 0.88rem;
      font-weight: 500;
      z-index: 9999;
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
      box-shadow: var(--shadow-lg);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 580px) {
      .header h1 { font-size: 1.7rem; }
      .result-actions { flex-direction: column; }
      .card { padding: 1.1rem 1.1rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <header class="header">
    <div class="header-icon">📄</div>
    <h1>PDF 요약기</h1>
    <p>PDF 문서를 업로드하면 AI가 핵심 내용을 한국어로 요약해드립니다</p>
  </header>

  <!-- API KEY -->
  <div class="card">
    <div class="card-label">OpenRouter API 키</div>
    <input
      type="password"
      class="api-key-input"
      id="api-key-input"
      placeholder="sk-or-v1-..."
      autocomplete="off"
      spellcheck="false"
    />
    <div class="api-key-status hint" id="api-key-status">
      sk-or- 로 시작하는 OpenRouter API 키를 입력하세요 — 이 브라우저에 자동 저장됩니다
    </div>
  </div>

  <!-- PDF UPLOAD -->
  <div class="card">
    <div class="card-label">PDF 파일</div>
    <div class="drop-zone" id="drop-zone" role="button" aria-label="PDF 파일 업로드 영역. 클릭하거나 파일을 드래그하세요." tabindex="0">
      <div class="drop-icon" aria-hidden="true">📂</div>
      <div class="drop-main-text">여기에 PDF 파일을 드래그하세요</div>
      <div class="drop-sub-text">또는 아래 버튼으로 직접 선택 (최대 50 MB)</div>
      <label class="btn-file-pick" for="file-input">파일 선택</label>
      <input type="file" id="file-input" accept=".pdf" aria-hidden="true" />
    </div>
    <div class="file-info" id="file-info" role="status">
      <div class="file-info-icon" aria-hidden="true">📋</div>
      <div>
        <div class="file-info-name" id="file-info-name"></div>
        <div class="file-info-meta" id="file-info-meta"></div>
      </div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="card" id="progress-section" aria-live="polite">
    <div class="card-label">텍스트 추출 중</div>
    <div class="progress-bar-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" id="progress-aria">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
    <div class="progress-label" id="progress-text">준비 중...</div>
    <div class="truncate-warning" id="truncate-warning" role="alert">
      <span aria-hidden="true">⚠️</span>
      <span>문서가 매우 길어 앞뒤 핵심 부분만 요약에 사용됩니다 (최대 60,000자 처리).</span>
    </div>
  </div>

  <!-- ERROR -->
  <div id="error-box" role="alert">
    <div class="error-msg-text" id="error-msg"></div>
    <button class="btn-retry" id="btn-retry">재시도</button>
  </div>

  <!-- SUMMARY BUTTON -->
  <button class="btn-summary" id="btn-summary" disabled aria-busy="false">
    <span id="btn-label">AI 요약 시작</span>
  </button>

  <!-- RESULT SECTION -->
  <div id="result-section" aria-live="polite">
    <div class="result-top">
      <span class="result-heading">요약 결과</span>
      <span class="badge badge-purple" id="result-doc-type"></span>
      <span class="badge badge-teal"   id="result-lang"></span>
    </div>

    <!-- Overview -->
    <div class="result-card">
      <div class="result-card-label">핵심 요약</div>
      <div class="result-card-title-text" id="result-title"></div>
      <div class="result-card-body"       id="result-overview"></div>
    </div>

    <!-- Sections -->
    <div class="result-card" id="card-sections">
      <div class="result-card-label">주요 섹션</div>
      <ul class="section-list" id="result-sections"></ul>
    </div>

    <!-- Keywords -->
    <div class="result-card" id="card-keywords">
      <div class="result-card-label">핵심 키워드</div>
      <div class="keywords-wrap" id="result-keywords"></div>
    </div>

    <!-- Conclusion -->
    <div class="result-card" id="card-conclusion">
      <div class="result-card-label">결론</div>
      <div class="result-card-body" id="result-conclusion"></div>
    </div>

    <div class="result-actions">
      <button class="btn-action btn-copy"  id="btn-copy">전체 복사</button>
      <button class="btn-action btn-reset" id="btn-reset">다른 PDF 요약하기</button>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
  /* ============================================================
     [블록 A] PDF 추출
  ============================================================ */
  if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }

  const PDF_ERRORS = {
    NOT_PDF: 'NOT_PDF',
    FILE_TOO_LARGE: 'FILE_TOO_LARGE',
    SCANNED_PDF: 'SCANNED_PDF',
    EXTRACT_FAILED: 'EXTRACT_FAILED',
  };

  const MAX_INPUT_CHARS = 60000;
  const MAX_FILE_SIZE_BYTES = 50 * 1024 * 1024;
  const SCANNED_PDF_THRESHOLD = 100;

  function validatePDFFile(file) {
    if (!file) return { valid: false, error: PDF_ERRORS.NOT_PDF };
    const extension = (file.name || '').split('.').pop().toLowerCase();
    if (extension !== 'pdf') return { valid: false, error: PDF_ERRORS.NOT_PDF };
    if (file.size > MAX_FILE_SIZE_BYTES) return { valid: false, error: PDF_ERRORS.FILE_TOO_LARGE };
    return { valid: true, error: null };
  }

  async function extractTextFromPDF(file, onProgress) {
    if (typeof pdfjsLib === 'undefined') throw new Error(PDF_ERRORS.EXTRACT_FAILED);
    let arrayBuffer;
    try { arrayBuffer = await file.arrayBuffer(); } catch { throw new Error(PDF_ERRORS.EXTRACT_FAILED); }
    let pdfDocument;
    try { pdfDocument = await pdfjsLib.getDocument({ data: arrayBuffer }).promise; } catch { throw new Error(PDF_ERRORS.EXTRACT_FAILED); }
    const pageCount = pdfDocument.numPages;
    const pageTexts = [];
    for (let pageNum = 1; pageNum <= pageCount; pageNum++) {
      try {
        const page = await pdfDocument.getPage(pageNum);
        const textContent = await page.getTextContent();
        pageTexts.push(textContent.items.map(item => item.str).join(' '));
      } catch { pageTexts.push(''); }
      if (typeof onProgress === 'function') onProgress(pageNum, pageCount);
    }
    const fullText = pageTexts.join('\n');
    if (fullText.trim().length < SCANNED_PDF_THRESHOLD) throw new Error(PDF_ERRORS.SCANNED_PDF);
    return { text: fullText, pageCount, charCount: fullText.length };
  }

  function truncateText(text) {
    if (!text || text.length <= MAX_INPUT_CHARS) return { text: text || '', truncated: false };
    const frontLength = Math.floor(MAX_INPUT_CHARS * 0.8);
    const backLength = MAX_INPUT_CHARS - frontLength;
    return {
      text: text.slice(0, frontLength) + '\n\n[... 중간 내용 생략 ...]\n\n' + text.slice(text.length - backLength),
      truncated: true
    };
  }

  /* ============================================================
     [블록 B] OpenRouter API 연동
  ============================================================ */
  const API_ERRORS = {
    INVALID_API_KEY: 'INVALID_API_KEY',
    NETWORK_ERROR: 'NETWORK_ERROR',
    RATE_LIMIT: 'RATE_LIMIT',
    SERVER_ERROR: 'SERVER_ERROR',
    API_ERROR: 'API_ERROR'
  };

  const SYSTEM_PROMPT = `당신은 문서 요약 전문가입니다. 사용자가 제공하는 PDF 텍스트를 분석하여 반드시 다음 JSON 형식으로만 응답하세요. 다른 텍스트는 절대 포함하지 마세요.

응답 형식:
{
  "title": "문서 제목 또는 주제 (추론)",
  "overview": "전체 문서의 핵심 내용을 3-5문장으로 요약한 한국어 텍스트",
  "sections": [
    { "heading": "섹션 제목", "summary": "해당 섹션의 핵심 내용 1-2문장" }
  ],
  "keywords": ["핵심 키워드 1", "키워드 2", "키워드 3", "키워드 4", "키워드 5"],
  "conclusion": "문서의 결론 또는 핵심 메시지 1-2문장",
  "document_type": "논문 | 보고서 | 계약서 | 매뉴얼 | 기타",
  "language_detected": "원문 언어 (예: 영어, 한국어, 일본어)"
}

요약 원칙:
1. 모든 응답은 반드시 한국어로 작성
2. sections 배열은 최대 7개
3. keywords 배열은 5-10개
4. 반드시 유효한 JSON만 출력`;

  function validateApiKey(apiKey) {
    if (typeof apiKey !== 'string') return false;
    const trimmed = apiKey.trim();
    return trimmed.startsWith('sk-or-') && trimmed.length > 10;
  }

  function parseSummaryResponse(content) {
    if (!content || typeof content !== 'string') return { overview: content, fallback: true };
    const stripped = content.replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/, '').trim();
    try { return JSON.parse(stripped); } catch {
      try { return JSON.parse(content.trim()); } catch { return { overview: content, fallback: true }; }
    }
  }

  async function callOpenRouterAPI(apiKey, extractedText) {
    let response;
    try {
      response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${apiKey}`,
          'Content-Type': 'application/json',
          'HTTP-Referer': window.location.href,
          'X-Title': 'PDF Summarizer'
        },
        body: JSON.stringify({
          model: 'openrouter/owl-alpha',
          messages: [
            { role: 'system', content: SYSTEM_PROMPT },
            { role: 'user', content: `다음 PDF 텍스트를 요약해주세요:\n\n${extractedText}` }
          ],
          max_tokens: 2000,
          temperature: 0.3
        })
      });
    } catch { throw API_ERRORS.NETWORK_ERROR; }
    if (!response.ok) {
      if (response.status === 401) throw API_ERRORS.INVALID_API_KEY;
      if (response.status === 429) throw API_ERRORS.RATE_LIMIT;
      if (response.status >= 500) throw API_ERRORS.SERVER_ERROR;
      throw API_ERRORS.API_ERROR;
    }
    let data;
    try { data = await response.json(); } catch { throw API_ERRORS.API_ERROR; }
    const rawContent = data?.choices?.[0]?.message?.content ?? null;
    if (rawContent === null) throw API_ERRORS.API_ERROR;
    return parseSummaryResponse(rawContent);
  }

  /* ============================================================
     UI 로직
  ============================================================ */
  const ERROR_MESSAGES = {
    NOT_PDF:        'PDF 파일만 지원합니다.',
    FILE_TOO_LARGE: '파일이 너무 큽니다 (최대 50 MB).',
    SCANNED_PDF:    '텍스트를 추출할 수 없습니다. 이미지 스캔본으로 보입니다.',
    EXTRACT_FAILED: '텍스트 추출에 실패했습니다. PDF 파일을 확인해주세요.',
    INVALID_API_KEY:'API 키가 올바르지 않습니다.',
    RATE_LIMIT:     '요청이 너무 많습니다. 잠시 후 재시도해주세요.',
    NETWORK_ERROR:  '인터넷 연결을 확인해주세요.',
    SERVER_ERROR:   '요약 중 오류가 발생했습니다. 재시도해주세요.',
    API_ERROR:      '요약 중 오류가 발생했습니다. 재시도해주세요.',
  };

  /* — state — */
  let extractedText = null;
  let currentFile   = null;

  /* — elements — */
  const elApiKey       = document.getElementById('api-key-input');
  const elApiStatus    = document.getElementById('api-key-status');
  const elDropZone      = document.getElementById('drop-zone');
  const elFileInput     = document.getElementById('file-input');
  const elFileInfo      = document.getElementById('file-info');
  const elFileInfoName  = document.getElementById('file-info-name');
  const elFileInfoMeta  = document.getElementById('file-info-meta');
  const elProgressSec   = document.getElementById('progress-section');
  const elProgressBar   = document.getElementById('progress-bar');
  const elProgressAria  = document.getElementById('progress-aria');
  const elProgressText  = document.getElementById('progress-text');
  const elTruncWarn     = document.getElementById('truncate-warning');
  const elErrorBox      = document.getElementById('error-box');
  const elErrorMsg      = document.getElementById('error-msg');
  const elBtnSummary    = document.getElementById('btn-summary');
  const elBtnLabel      = document.getElementById('btn-label');
  const elResultSec     = document.getElementById('result-section');
  const elToast         = document.getElementById('toast');


  /* ── API Key (localStorage 자동 저장) ── */
  const LS_KEY = 'pdfsum_api_key';
  const savedKey = localStorage.getItem(LS_KEY);
  if (savedKey) { elApiKey.value = savedKey; applyApiKeyStyle(savedKey); }

  elApiKey.addEventListener('input', () => {
    const v = elApiKey.value;
    applyApiKeyStyle(v);
    if (validateApiKey(v)) localStorage.setItem(LS_KEY, v.trim());
    else localStorage.removeItem(LS_KEY);
  });

  function applyApiKeyStyle(v) {
    if (validateApiKey(v)) {
      elApiStatus.className = 'api-key-status ok';
      elApiStatus.textContent = '✓ API 키가 저장되었습니다';
      elApiKey.classList.add('valid-key');
    } else {
      elApiStatus.className = 'api-key-status hint';
      elApiStatus.textContent = 'sk-or- 로 시작하는 OpenRouter API 키를 입력하세요 — 이 브라우저에 자동 저장됩니다';
      elApiKey.classList.remove('valid-key');
    }
  }

  /* ── Drag & Drop ── */
  let _dragCounter = 0;
  elDropZone.addEventListener('dragenter', e => {
    e.preventDefault();
    _dragCounter++;
    elDropZone.classList.add('drag-over');
  });
  elDropZone.addEventListener('dragover', e => {
    e.preventDefault();
    elDropZone.classList.add('drag-over');
  });
  elDropZone.addEventListener('dragleave', e => {
    _dragCounter--;
    /* Only remove the highlight when the cursor truly leaves the entire drop zone.
       Without this check, dragleave fires for every child element entered, causing flicker. */
    if (_dragCounter <= 0) {
      _dragCounter = 0;
      elDropZone.classList.remove('drag-over');
    }
  });
  elDropZone.addEventListener('drop', e => {
    _dragCounter = 0;
    e.preventDefault();
    elDropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  /* Click on drop zone background (not the label/button) */
  elDropZone.addEventListener('click', e => {
    const notLabel = !e.target.classList.contains('btn-file-pick') && e.target.tagName !== 'LABEL';
    if (notLabel) elFileInput.click();
  });

  /* Keyboard accessibility for drop zone */
  elDropZone.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); elFileInput.click(); }
  });

  elFileInput.addEventListener('change', () => {
    if (elFileInput.files[0]) handleFile(elFileInput.files[0]);
  });

  /* ── Core handler ── */
  async function handleFile(file) {
    resetExtraction();
    currentFile = file;

    const validation = validatePDFFile(file);
    if (!validation.valid) {
      showToast(ERROR_MESSAGES[validation.error], true);
      return;
    }

    /* File info row */
    elFileInfo.classList.add('visible');
    elFileInfoName.textContent = file.name;
    elFileInfoMeta.textContent = formatFileSize(file.size);
    elDropZone.classList.add('has-file');

    /* Progress section */
    elProgressSec.classList.add('visible');
    setProgress(0, 'PDF 분석 준비 중...');

    try {
      const result = await extractTextFromPDF(file, (cur, total) => {
        const pct = Math.round((cur / total) * 100);
        setProgress(pct, `${cur} / ${total} 페이지 텍스트 추출 중...`);
      });

      setProgress(100, `완료! 총 ${result.charCount.toLocaleString()}자 추출됨`);
      elFileInfoMeta.textContent =
        `${formatFileSize(file.size)} · ${result.pageCount}페이지 · ${result.charCount.toLocaleString()}자`;

      const truncated = truncateText(result.text);
      extractedText = truncated.text;

      if (truncated.truncated) {
        elTruncWarn.classList.add('visible');
      }

      elBtnSummary.disabled = false;
    } catch (err) {
      showError(err.message || String(err));
      elProgressSec.classList.remove('visible');
    }
  }

  function setProgress(pct, label) {
    elProgressBar.style.width = pct + '%';
    elProgressAria.setAttribute('aria-valuenow', pct);
    elProgressText.textContent = label;
  }

  function formatFileSize(bytes) {
    if (bytes >= 1024 * 1024) return (bytes / 1024 / 1024).toFixed(2) + ' MB';
    return (bytes / 1024).toFixed(1) + ' KB';
  }

  /* ── Summary button ── */
  elBtnSummary.addEventListener('click', async () => {
    const apiKey = elApiKey.value.trim();
    if (!validateApiKey(apiKey)) {
      showToast('먼저 OpenRouter API 키를 입력하세요.', true);
      elApiKey.focus();
      return;
    }
    if (!extractedText) {
      showToast('먼저 PDF 파일을 업로드하세요.', true);
      return;
    }

    /* Loading state */
    elBtnSummary.disabled = true;
    elBtnSummary.setAttribute('aria-busy', 'true');
    elBtnLabel.textContent = '요약 중...';
    const spinner = document.createElement('div');
    spinner.className = 'spinner';
    elBtnSummary.prepend(spinner);
    hideError();
    hideResult();

    try {
      const result = await callOpenRouterAPI(apiKey, extractedText);
      renderSummary(result);
    } catch (err) {
      showError(String(err));
    } finally {
      elBtnSummary.disabled = false;
      elBtnSummary.setAttribute('aria-busy', 'false');
      elBtnLabel.textContent = 'AI 요약 시작';
      const s = elBtnSummary.querySelector('.spinner');
      if (s) s.remove();
    }
  });

  /* ── Render summary ── */
  function renderSummary(result) {
    hideError();

    const show = id => { const el = document.getElementById(id); if (el) el.style.display = ''; };
    const hide = id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; };

    if (result.fallback) {
      /* Fallback: plain text */
      setText('result-doc-type', '');
      setText('result-lang', '');
      setText('result-title', '요약 결과');
      setText('result-overview', result.overview || '');
      hide('card-sections');
      hide('card-keywords');
      hide('card-conclusion');
    } else {
      show('card-sections');
      show('card-keywords');
      show('card-conclusion');

      setText('result-doc-type',  result.document_type    || '');
      setText('result-lang',      result.language_detected || '');
      setText('result-title',     result.title    || '문서 요약');
      setText('result-overview',  result.overview || '');
      setText('result-conclusion',result.conclusion || '');

      /* Sections */
      const secList = document.getElementById('result-sections');
      secList.innerHTML = '';
      if (Array.isArray(result.sections)) {
        result.sections.forEach(sec => {
          const li = document.createElement('li');
          li.className = 'section-item';
          const h = document.createElement('div');
          h.className = 'section-item-heading';
          h.textContent = '• ' + (sec.heading || '');
          const s = document.createElement('div');
          s.className = 'section-item-summary';
          s.textContent = sec.summary || '';
          li.appendChild(h);
          li.appendChild(s);
          secList.appendChild(li);
        });
      }

      /* Keywords */
      const kwWrap = document.getElementById('result-keywords');
      kwWrap.innerHTML = '';
      if (Array.isArray(result.keywords)) {
        result.keywords.forEach(kw => {
          const tag = document.createElement('span');
          tag.className = 'keyword-tag';
          tag.textContent = kw;
          kwWrap.appendChild(tag);
        });
      }
    }

    /* Re-trigger slide-up animation */
    elResultSec.classList.remove('visible');
    void elResultSec.offsetWidth; /* force reflow */
    elResultSec.classList.add('visible');
    setTimeout(() => elResultSec.scrollIntoView({ behavior: 'smooth', block: 'start' }), 60);
  }

  function setText(id, value) {
    const el = document.getElementById(id);
    if (el) el.textContent = value;
  }

  /* ── Copy button ── */
  document.getElementById('btn-copy').addEventListener('click', () => {
    const parts = [
      '[PDF 요약 결과]',
      `문서 유형: ${getText('result-doc-type')}  |  원문 언어: ${getText('result-lang')}`,
      '',
      `제목: ${getText('result-title')}`,
      '',
      '핵심 요약:',
      getText('result-overview'),
      '',
      '주요 섹션:',
      ...Array.from(document.querySelectorAll('.section-item')).map(el => el.innerText.replace(/\n/g, ' — ')),
      '',
      `핵심 키워드: ${Array.from(document.querySelectorAll('.keyword-tag')).map(t => t.textContent).join(', ')}`,
      '',
      '결론:',
      getText('result-conclusion'),
    ];
    navigator.clipboard.writeText(parts.join('\n')).then(
      () => showToast('클립보드에 복사되었습니다!'),
      () => showToast('복사에 실패했습니다.', true)
    );
  });

  function getText(id) {
    const el = document.getElementById(id);
    return el ? el.textContent : '';
  }

  /* ── Reset / Retry ── */
  document.getElementById('btn-reset').addEventListener('click', resetAll);
  document.getElementById('btn-retry').addEventListener('click', () => {
    if (extractedText) {
      elBtnSummary.click();
    } else if (currentFile) {
      handleFile(currentFile);
    }
  });

  function resetAll() {
    extractedText = null;
    currentFile   = null;
    elFileInput.value = '';
    elDropZone.classList.remove('has-file');
    elFileInfo.classList.remove('visible');
    resetExtraction();
    hideError();
    hideResult();
  }

  function resetExtraction() {
    extractedText = null;
    elProgressSec.classList.remove('visible');
    elTruncWarn.classList.remove('visible');
    elBtnSummary.disabled = true;
    setProgress(0, '준비 중...');
    elFileInfo.classList.remove('visible');
    elFileInfoName.textContent = '';
    elFileInfoMeta.textContent = '';
    elDropZone.classList.remove('has-file');
  }

  function showError(code) {
    const msg = ERROR_MESSAGES[code] || '알 수 없는 오류가 발생했습니다.';
    elErrorMsg.textContent = msg;
    elErrorBox.classList.add('visible');
  }
  function hideError()  { elErrorBox.classList.remove('visible'); }
  function hideResult() { elResultSec.classList.remove('visible'); }

  /* ── Toast ── */
  let toastTimer;
  function showToast(msg, isError = false) {
    elToast.textContent = msg;
    elToast.style.background = isError ? '#7f1d1d' : '#1e1b4b';
    elToast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => elToast.classList.remove('show'), 3000);
  }
</script>
